<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills | Nagaraj Umatar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base Dark Theme - Matching Index/About #1f242d exactly */
        body {
            background-color: #1f242d;
            color: white;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.3s;
        }
        .text-cyan { color: #00d2ff; }
        /* Navigation & Section Background set to #1f242d for seamless look */
        nav, section {
            background-color: #1f242d;
            transition: background-color 0.3s, border-color 0.3s;
        }
        /* Skill Card Styles - Matching Experience Section #323946 */
        .skill-card {
            background-color: #323946;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .skill-card:hover {
            border-color: #00d2ff;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        /* Glowing effect for the icons on hover */
        .skill-card:hover i {
            filter: drop-shadow(0 0 10px #00d2ff);
        }
        /* --- LIGHT MODE UPDATES --- */
        body.light-mode {
            background-color: #ffffff;
            color: #000000;
        }
        /* Header/Nav Text and Background in Light Mode */
        body.light-mode nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }
        /* Target Logo and Nav Links for Dark Black text */
        body.light-mode nav .logo-text,
        body.light-mode nav .nav-link {
            color: #000000 !important;
        }
        body.light-mode section {
            background-color: #ffffff;
        }
        /* Cards in light mode */
        body.light-mode .skill-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            color: #000000;
        }
        body.light-mode footer {
            background-color: #ffffff;
            border-color: #e5e7eb;
            color: #000000;
        }
    </style>
</head>
<body class="font-sans">

        <div class="hidden md:flex space-x-8 text-gray-300 font-medium">
            <a href="index.html" class="nav-link hover:text-cyan-400 transition duration-300">Home</a>

                <h3 class="skill-title text-xl font-bold text-center">Data Dictionary</h3>
            </div>

        <p>© 2026 Nagaraj Umatar. All Rights Reserved.</p>
    </footer>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        // Check for saved theme on page load
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            themeToggle.classList.replace('fa-moon', 'fa-sun');
        }
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                themeToggle.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                themeToggle.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>

</html>
